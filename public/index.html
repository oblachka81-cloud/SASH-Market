<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SASH Market</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f0f1a;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    h1 { color: #e94560; font-size: 2em; }
    p { color: #aaa; }
    .flags { margin-top: 20px; }
    .flags button {
      background: none;
      border: 1px solid #aaa;
      color: #aaa;
      padding: 10px 15px;
      margin: 5px;
      border-radius: 8px;
      font-size: 1.2em;
      cursor: pointer;
    }
    .flags button.active {
      border-color: #e94560;
      color: #e94560;
    }
  </style>
</head>
<body>
  <h1>SASH Market</h1>
  <p>Глобальная торговая экосистема</p>
  <div class="flags">
    <button class="active" data-lang="ru">🇷🇺 RU</button>
    <button data-lang="en">🇬🇧 EN</button>
    <button data-lang="es">🇪🇸 ES</button>
    <button data-lang="fr">🇫🇷 FR</button>
  </div>
  <p id="message">Добро пожаловать!</p>
  <script>
    const messages = {
      ru: 'Добро пожаловать!',
      en: 'Welcome!',
      es: '¡Bienvenido!',
      fr: 'Bienvenue!'
    };
    document.querySelectorAll('.flags button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.flags button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('message').textContent = messages[btn.dataset.lang];
      });
    });
  </script>
</body>
</html>
