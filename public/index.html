<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SASH Market</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --accent: #e94560;
            --gold: #d4a574;
            --text: #eee;
            --sub: #aaa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 70px;
        }
        .header {
            background: linear-gradient(135deg, #e94560, #c23152);
            padding: 16px;
            text-align: center;
        }
        .header h1 { font-size: 1.3em; margin-bottom: 8px; }
        .lang-switcher { display: flex; justify-content: center; gap: 8px; }
        .lang-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid transparent; background: rgba(255,255,255,0.2);
            font-size: 1em; cursor: pointer;
        }
        .lang-btn.active { border-color: #fff; background: rgba(255,255,255,0.4); }
        .tabs {
            display: flex; background: var(--card);
            position: sticky; top: 0; z-index: 10;
        }
        .tab {
            flex: 1; padding: 12px 8px; text-align: center;
            font-weight: 600; font-size: 0.8em; color: var(--sub);
            border: none; background: none; cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .content { padding: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .product-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .product-card {
            background: var(--card); border-radius: 12px;
            overflow: hidden; cursor: pointer;
        }
        .product-card img {
            width: 100%; height: 130px; object-fit: cover; background: #2a2a4a;
        }
        .product-card .info { padding: 10px; }
        .product-card .name { font-weight: 600; font-size: 0.85em; }
        .product-card .price { color: var(--accent); font-weight: 700; margin-top: 4px; }
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block; font-size: 0.8em; color: var(--sub); margin-bottom: 4px;
        }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px; border-radius: 8px;
            border: 1px solid #333; background: var(--card);
            color: var(--text); font-size: 0.9em;
        }
        .submit-btn {
            width: 100%; padding: 12px;
            background: var(--accent); color: #fff; border: none;
            border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer;
        }
        .empty-state {
            grid-column: 1 / -1; text-align: center;
            padding: 40px 20px; color: var(--sub);
        }
        .navbar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card); display: flex;
            justify-content: space-around; padding: 8px 0;
            border-top: 1px solid #333;
        }
        .nav-btn {
            font-size: 1.4em; background: none; border: none;
            color: var(--sub); cursor: pointer; padding: 8px 16px;
        }
        .nav-btn.active { color: var(--accent); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛍 SASH Market</h1>
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="ru">🇷🇺</button>
            <button class="lang-btn" data-lang="en">🇬🇧</button>
            <button class="lang-btn" data-lang="es">🇪🇸</button>
            <button class="lang-btn" data-lang="fr">🇫🇷</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="buy">🛒 Купить</button>
        <button class="tab" data-tab="sell">📢 Продать</button>
        <button class="tab" data-tab="logistics">🚚 Логистика</button>
    </div>

    <div class="content">
        <div class="tab-content active" id="tab-buy">
            <div class="product-grid" id="productGrid">
                <div class="empty-state" id="emptyBuy">🛒 Товары скоро появятся</div>
            </div>
        </div>
        <div class="tab-content" id="tab-sell">
            <div class="form-group">
                <label id="lblName">Название</label>
                <input type="text" id="itemName">
            </div>
            <div class="form-group">
                <label id="lblPrice">Цена (руб)</label>
                <input type="number" id="itemPrice">
            </div>
            <div class="form-group">
                <label id="lblDesc">Описание</label>
                <textarea id="itemDesc" rows="2"></textarea>
            </div>
            <button class="submit-btn" id="btnPublish">📢 Опубликовать</button>
        </div>
        <div class="tab-content" id="tab-logistics">
            <div class="empty-state" id="emptyLog">🚚 Отслеживание скоро будет доступно</div>
        </div>
    </div>

    <div class="navbar">
        <button class="nav-btn active" data-tab="buy">🏠</button>
        <button class="nav-btn" data-tab="sell">➕</button>
        <button class="nav-btn" data-tab="logistics">📦</button>
    </div>

    <script>
        const LOCALES = {
            ru: { buy: '🛒 Купить', sell: '📢 Продать', logistics: '🚚 Логистика', emptyBuy: '🛒 Товары скоро появятся', emptySell: '', emptyLog: '🚚 Отслеживание скоро будет доступно', lblName: 'Название', lblPrice: 'Цена (руб)', lblDesc: 'Описание', btnPublish: '📢 Опубликовать' },
            en: { buy: '🛒 Buy', sell: '📢 Sell', logistics: '🚚 Logistics', emptyBuy: '🛒 Products coming soon', emptySell: '', emptyLog: '🚚 Tracking coming soon', lblName: 'Name', lblPrice: 'Price (rub)', lblDesc: 'Description', btnPublish: '📢 Publish' },
            es: { buy: '🛒 Comprar', sell: '📢 Vender', logistics: '🚚 Logística', emptyBuy: '🛒 Productos próximamente', emptySell: '', emptyLog: '🚚 Seguimiento próximamente', lblName: 'Nombre', lblPrice: 'Precio (rub)', lblDesc: 'Descripción', btnPublish: '📢 Publicar' },
            fr: { buy: '🛒 Acheter', sell: '📢 Vendre', logistics: '🚚 Logistique', emptyBuy: '🛒 Produits à venir', emptySell: '', emptyLog: '🚚 Suivi à venir', lblName: 'Nom', lblPrice: 'Prix (rub)', lblDesc: 'Description', btnPublish: '📢 Publier' }
        };
        let currentLang = 'ru';

        function updateUI() {
            const loc = LOCALES[currentLang];
            document.querySelector('.tab[data-tab="buy"]').textContent = loc.buy;
            document.querySelector('.tab[data-tab="sell"]').textContent = loc.sell;
            document.querySelector('.tab[data-tab="logistics"]').textContent = loc.logistics;
            document.getElementById('emptyBuy').textContent = loc.emptyBuy;
            document.getElementById('emptyLog').textContent = loc.emptyLog;
            document.getElementById('lblName').textContent = loc.lblName;
            document.getElementById('lblPrice').textContent = loc.lblPrice;
            document.getElementById('lblDesc').textContent = loc.lblDesc;
            document.getElementById('btnPublish').textContent = loc.btnPublish;
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentLang = btn.dataset.lang;
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateUI();
            });
        });

        document.querySelectorAll('.tab, .nav-btn').forEach(el => {
            el.addEventListener('click', () => {
                const tab = el.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
                document.querySelector(`.nav-btn[data-tab="${tab}"]`).classList.add('active');
                document.getElementById(`tab-${tab}`).classList.add('active');
            });
        });

        updateUI();
    </script>
</body>
</html>
