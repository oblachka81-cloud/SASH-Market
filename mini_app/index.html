<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SASH Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>🛍 SASH Market</h1>
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="ru">🇷🇺</button>
            <button class="lang-btn" data-lang="en">🇬🇧</button>
            <button class="lang-btn" data-lang="es">🇪🇸</button>
            <button class="lang-btn" data-lang="fr">🇫🇷</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="buy">🛒 Купить</button>
        <button class="tab" data-tab="sell">📢 Продать</button>
        <button class="tab" data-tab="logistics">🚚 Логистика</button>
    </div>

    <div class="content" id="content">
        <!-- Каталог -->
        <div class="tab-content active" id="tab-buy">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Поиск товаров...">
            </div>
            <div class="product-grid" id="productGrid">
                <!-- Товары загрузятся через JS -->
                <div class="empty-state">🛒 Товары скоро появятся</div>
            </div>
        </div>

        <!-- Продать -->
        <div class="tab-content" id="tab-sell">
            <form class="sell-form" id="sellForm">
                <label>Название товара</label>
                <input type="text" id="itemName" required>
                
                <label>Цена (руб)</label>
                <input type="number" id="itemPrice" required>
                
                <label>Описание</label>
                <textarea id="itemDesc" rows="3"></textarea>
                
                <label>Контакт (телефон или @username)</label>
                <input type="text" id="itemContact" required>
                
                <label>Фото (ссылка)</label>
                <input type="text" id="itemPhoto" placeholder="https://...">
                
                <button type="submit" class="submit-btn">📢 Опубликовать</button>
            </form>
        </div>

        <!-- Логистика -->
        <div class="tab-content" id="tab-logistics">
            <div class="empty-state">🚚 Отслеживание заказов скоро будет доступно</div>
        </div>
    </div>

    <div class="navbar">
        <button class="nav-btn active" data-tab="buy">🏠</button>
        <button class="nav-btn" data-tab="sell">➕</button>
        <button class="nav-btn" data-tab="logistics">📦</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
